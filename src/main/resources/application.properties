server.port=8080
spring.application.name=StockSphere

# CORS — comma-separated allowed origins.
# Override via environment variable: CORS_ALLOWED_ORIGINS=https://yourdomain.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080}

# Mock data mode — set USE_MOCK_DATA=false in production when real APIs are integrated.
app.use-mock-data=${USE_MOCK_DATA:true}

# External API keys — MUST be supplied via environment variables in production.
# These placeholders keep the app functional in development with mock data.
alphavantage.api.key=${ALPHAVANTAGE_API_KEY:demo}
newsapi.api.key=${NEWSAPI_KEY:demo}

# SMA Configuration (Task 13)
stocksphere.sma.short=20
stocksphere.sma.long=50

# Logging
logging.level.com.stocksphere=INFO
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n
